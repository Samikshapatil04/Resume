    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<body>

    <header>

        <div class="icon-container">

    <main>

            <div class="search-container">

            <div class="assignments">

                <div class="assignment">

                        <h3 class="assignment-title">Beauty Parlour Website</h3>

                    </div>
                </div>

                <div class="assignment">
                    <div class="assignment-content">

                        <a href="https://github.com/Samikshapatil04/AdVantage-Gen" class="view-button">View Project</a>

                </div>

                <div class="assignment">
                    <div class="assignment-content">
                        <h3 class="assignment-title">Flight Booking App</h3>
                        <a href="https://flight-booking-app-a1g3.vercel.app/" class="view-button">View Project</a>

                <div class="assignment">

            </div>

        </div>
    </main>

    <script>
        function searchAssignments() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.assignment');

            cards.forEach(card => {
                const title = card.querySelector('.assignment-title').textContent.toLowerCase();
                card.style.display = title.includes(input) ? "flex" : "none";
            });
        }

        document.getElementById('searchInput').addEventListener('input', searchAssignments);
    </script>
